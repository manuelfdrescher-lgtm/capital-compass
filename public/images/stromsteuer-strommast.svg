<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: Hochspannungsmast mit Leitungen und einer Fabrik am Horizont">
  <defs>
    <pattern id="st-hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#111111" stroke-width="1" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Horizont -->
  <line x1="80" y1="404" x2="1120" y2="404" stroke="#111111" stroke-width="1.6"/>
  <g stroke="#111111" stroke-width="0.7" opacity="0.5">
    <line x1="120" y1="416" x2="520" y2="416"/>
    <line x1="720" y1="416" x2="1080" y2="416"/>
  </g>

  <!-- Fabrik am Horizont (Industrie profitiert) -->
  <g stroke="#111111" stroke-width="1.8" fill="#f4efe6">
    <rect x="820" y="330" width="220" height="74"/>
    <path d="M820 330 l 26 -24 l 26 24 M872 330 l 26 -24 l 26 24 M924 330 l 26 -24 l 26 24 M976 330 l 26 -24 l 26 24"/>
    <rect x="1000" y="270" width="20" height="60"/>
  </g>
  <g stroke="#111111" stroke-width="1" opacity="0.5" fill="none">
    <path d="M1010 270 q -10 -16 4 -30 q 12 -12 2 -28"/>
  </g>
  <g fill="url(#st-hatch)" stroke="#111111" stroke-width="1">
    <rect x="836" y="352" width="24" height="34"/><rect x="888" y="352" width="24" height="34"/>
    <rect x="940" y="352" width="24" height="34"/><rect x="992" y="352" width="24" height="34"/>
  </g>

  <!-- Hochspannungsmast -->
  <g stroke="#111111" fill="none">
    <path d="M300 404 L360 120 L420 404" stroke-width="2.4"/>
    <path d="M330 260 L390 260 M320 316 L400 316 M312 360 L408 360" stroke-width="1.8"/>
    <!-- Traversen -->
    <path d="M232 214 L488 214" stroke-width="2.2"/>
    <path d="M262 172 L458 172" stroke-width="2.2"/>
    <!-- Fachwerk -->
    <g stroke-width="1">
      <path d="M330 260 L400 316 M390 260 L320 316 M320 316 L408 360 M400 316 L312 360"/>
      <path d="M345 214 L360 172 M375 214 L360 172"/>
    </g>
    <!-- Isolatoren -->
    <g stroke-width="1.6">
      <line x1="232" y1="214" x2="232" y2="234"/><line x1="360" y1="214" x2="360" y2="234"/><line x1="488" y1="214" x2="488" y2="234"/>
      <line x1="262" y1="172" x2="262" y2="188"/><line x1="458" y1="172" x2="458" y2="188"/>
    </g>
  </g>
  <!-- Leitungen ziehen zur Fabrik -->
  <g stroke="#111111" stroke-width="1" opacity="0.7" fill="none">
    <path d="M488 234 Q680 250 1000 300"/>
    <path d="M488 234 Q660 236 830 300"/>
    <path d="M232 234 Q120 250 60 264"/>
  </g>

  <!-- Preisschild: 5 ct -->
  <g stroke="#111111" fill="#f4efe6">
    <rect x="560" y="150" width="150" height="86" rx="8" stroke-width="2.2"/>
    <circle cx="576" cy="166" r="5" stroke-width="1.6"/>
  </g>
  <g font-family="Georgia, serif" fill="#111111" text-anchor="middle">
    <text x="635" y="200" font-size="34">5 ct</text>
    <text x="635" y="224" font-size="13" font-style="italic" opacity="0.72">je kWh, Industrie</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="470" font-size="25" letter-spacing="5">STROM, PREIS UND POLITIK</text>
    <text x="600" y="496" font-size="15" font-style="italic" opacity="0.7">Der Industriestrompreis, Tafel IV · The Capital Compass</text>
  </g>
  <line x1="440" y1="444" x2="760" y2="444" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="448" x2="710" y2="448" stroke="#111111" stroke-width="0.6"/>
</svg>
