<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: Öltanker in der schmalen Straße von Hormus zwischen zwei Landmassen">
  <defs>
    <pattern id="hz-water" width="9" height="9" patternTransform="rotate(0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="4.5" x2="9" y2="4.5" stroke="#111111" stroke-width="0.7" opacity="0.20"/>
    </pattern>
    <pattern id="hz-land" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#111111" stroke-width="1" opacity="0.24"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Wasser der Meerenge -->
  <rect x="26" y="130" width="1148" height="286" fill="url(#hz-water)"/>

  <!-- Landmasse oben (Iran) -->
  <path d="M26 130 H1174 V60 Q980 96 820 74 Q700 58 560 88 Q420 118 300 92 Q160 70 26 104 Z"
        fill="url(#hz-land)" stroke="#111111" stroke-width="2.2"/>
  <path d="M26 130 H1174" stroke="#111111" stroke-width="1.4"/>
  <text x="150" y="98" font-family="Georgia, serif" font-size="16" letter-spacing="3" fill="#111111" opacity="0.75">IRAN</text>

  <!-- Landmasse unten (Arabische Halbinsel) -->
  <path d="M26 416 H1174 V500 Q1000 470 860 492 Q720 514 580 486 Q440 460 300 490 Q170 516 26 486 Z"
        fill="url(#hz-land)" stroke="#111111" stroke-width="2.2"/>
  <path d="M26 416 H1174" stroke="#111111" stroke-width="1.4"/>
  <text x="900" y="452" font-family="Georgia, serif" font-size="16" letter-spacing="3" fill="#111111" opacity="0.75">ARABISCHE HALBINSEL</text>

  <!-- Engstelle markiert durch gestrichelte Fahrrinne -->
  <line x1="60" y1="273" x2="1140" y2="273" stroke="#111111" stroke-width="1" stroke-dasharray="14 12" opacity="0.55"/>

  <!-- Öltanker in der Mitte -->
  <g stroke="#111111" fill="#f4efe6">
    <path d="M360 300 L820 300 L860 300 L840 344 L400 344 Q372 344 360 322 Z" stroke-width="2.4"/>
    <!-- Aufbauten achtern -->
    <rect x="770" y="262" width="70" height="40" stroke-width="2"/>
    <rect x="784" y="246" width="42" height="18" stroke-width="1.6"/>
    <line x1="806" y1="246" x2="806" y2="224" stroke-width="1.6"/>
    <!-- Tankdeck-Struktur -->
    <g stroke-width="1.1" opacity="0.75">
      <line x1="404" y1="318" x2="770" y2="318"/>
      <circle cx="452" cy="309" r="9" fill="none"/>
      <circle cx="512" cy="309" r="9" fill="none"/>
      <circle cx="572" cy="309" r="9" fill="none"/>
      <circle cx="632" cy="309" r="9" fill="none"/>
      <circle cx="692" cy="309" r="9" fill="none"/>
    </g>
    <!-- Bug -->
    <line x1="360" y1="300" x2="372" y2="322" stroke-width="1.4"/>
  </g>
  <!-- Bugwelle -->
  <g stroke="#111111" stroke-width="1" opacity="0.5" fill="none">
    <path d="M330 330 Q346 340 360 332"/>
    <path d="M320 346 Q342 358 362 348"/>
  </g>

  <!-- Sperr-Kette quer über die Fahrrinne (Symbol der Sperrung) -->
  <g stroke="#111111" stroke-width="1.6" fill="none" opacity="0.85">
    <circle cx="980" cy="273" r="7"/>
    <circle cx="1000" cy="273" r="7"/>
    <circle cx="1020" cy="273" r="7"/>
    <circle cx="1040" cy="273" r="7"/>
    <line x1="1055" y1="200" x2="1055" y2="346" stroke-dasharray="6 8"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="502" font-size="26" letter-spacing="6">NADELÖHR DER WELTWIRTSCHAFT</text>
    <text x="600" y="528" font-size="15" font-style="italic" opacity="0.7">Die Straße von Hormus, Tafel I · The Capital Compass</text>
  </g>
  <line x1="440" y1="476" x2="760" y2="476" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="480" x2="710" y2="480" stroke="#111111" stroke-width="0.6"/>
</svg>
