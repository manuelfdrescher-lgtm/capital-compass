<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Gestochene Illustration: Prozessorchip mit einer abflachenden Kurve">
  <defs>
    <pattern id="chip-hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#111111" stroke-width="1" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#f4efe6"/>
  <rect x="14" y="14" width="1172" height="532" fill="none" stroke="#111111" stroke-width="2.5"/>
  <rect x="22" y="22" width="1156" height="516" fill="none" stroke="#111111" stroke-width="0.8"/>

  <!-- Chip-Gehäuse -->
  <g stroke="#111111" fill="#f4efe6">
    <rect x="300" y="150" width="300" height="260" rx="10" stroke-width="2.6"/>
    <rect x="330" y="180" width="240" height="200" rx="6" fill="url(#chip-hatch)" stroke-width="1.8"/>
    <!-- innerer Die -->
    <rect x="378" y="222" width="144" height="116" fill="#f4efe6" stroke-width="1.6"/>
    <g stroke-width="0.9" opacity="0.7">
      <line x1="378" y1="252" x2="522" y2="252"/>
      <line x1="378" y1="282" x2="522" y2="282"/>
      <line x1="378" y1="312" x2="522" y2="312"/>
      <line x1="426" y1="222" x2="426" y2="338"/>
      <line x1="474" y1="222" x2="474" y2="338"/>
    </g>
  </g>
  <!-- Pins -->
  <g stroke="#111111" stroke-width="2">
    <g>
      <line x1="300" y1="185" x2="266" y2="185"/><line x1="300" y1="225" x2="266" y2="225"/>
      <line x1="300" y1="265" x2="266" y2="265"/><line x1="300" y1="305" x2="266" y2="305"/>
      <line x1="300" y1="345" x2="266" y2="345"/><line x1="300" y1="375" x2="266" y2="375"/>
    </g>
    <g>
      <line x1="600" y1="185" x2="634" y2="185"/><line x1="600" y1="225" x2="634" y2="225"/>
      <line x1="600" y1="265" x2="634" y2="265"/><line x1="600" y1="305" x2="634" y2="305"/>
      <line x1="600" y1="345" x2="634" y2="345"/><line x1="600" y1="375" x2="634" y2="375"/>
    </g>
  </g>

  <!-- Abflachende Kurve rechts: Euphorie, die an Höhe verliert -->
  <g stroke="#111111" fill="none">
    <line x1="720" y1="400" x2="1120" y2="400" stroke-width="1.6"/>
    <line x1="720" y1="400" x2="720" y2="150" stroke-width="1.6"/>
    <path d="M732 388 C 820 300 900 190 980 176 C 1030 168 1070 214 1112 262" stroke-width="2.6"/>
    <!-- Hochpunkt markiert -->
    <circle cx="980" cy="176" r="5" fill="#111111"/>
    <line x1="980" y1="176" x2="980" y2="400" stroke-width="0.8" stroke-dasharray="5 7" opacity="0.6"/>
    <!-- Abwärtspfeil am Ende -->
    <path d="M1112 262 l -4 -18 m 4 18 l 16 -8" stroke-width="2"/>
  </g>
  <g font-family="Georgia, serif" fill="#111111" opacity="0.75">
    <text x="986" y="166" font-size="13" font-style="italic">Mai-Hoch</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#111111" text-anchor="middle">
    <text x="600" y="490" font-size="26" letter-spacing="6">DIE GRENZEN DER EUPHORIE</text>
    <text x="600" y="516" font-size="15" font-style="italic" opacity="0.7">Künstliche Intelligenz und Halbleiter, Tafel II · The Capital Compass</text>
  </g>
  <line x1="440" y1="464" x2="760" y2="464" stroke="#111111" stroke-width="1"/>
  <line x1="490" y1="468" x2="710" y2="468" stroke="#111111" stroke-width="0.6"/>
</svg>
